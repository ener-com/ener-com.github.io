# ============================================================
#  Enercom – GitHub Actions: Build & Deploy to GitHub Pages
# ============================================================
#
# This workflow:
#   1. Checks out the repo
#   2. Runs scripts/build.js to inject secrets into index.html
#   3. Deploys the dist/ folder to GitHub Pages
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   PHONE_NUMBER     – e.g. 521234567890
#   PHONE_DISPLAY    – e.g. +52 123 456 7890
#   WHATSAPP_MSG     – URL-encoded message
#   FACEBOOK_SLUG    – e.g. MyPageName
#   FACEBOOK_HANDLE  – e.g. @MyPageName
#   GA_ID            – e.g. G-XXXXXXXXXX
#   FB_PIXEL_ID      – Facebook Pixel ID
#   FORMSPREE_ID     – Formspree form hash

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Sets permissions for GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔨 Build (inject secrets)
        env:
          PHONE_NUMBER:    ${{ secrets.PHONE_NUMBER }}
          PHONE_DISPLAY:   ${{ secrets.PHONE_DISPLAY }}
          WHATSAPP_MSG:    ${{ secrets.WHATSAPP_MSG }}
          FACEBOOK_SLUG:   ${{ secrets.FACEBOOK_SLUG }}
          FACEBOOK_HANDLE: ${{ secrets.FACEBOOK_HANDLE }}
          GA_ID:           ${{ secrets.GA_ID }}
          FB_PIXEL_ID:     ${{ secrets.FB_PIXEL_ID }}
          FORMSPREE_ID:    ${{ secrets.FORMSPREE_ID }}
        run: node scripts/build.js

      - name: 📄 Setup Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
