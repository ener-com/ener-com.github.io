# ============================================================
#  Enercom – GitHub Actions: Build & Deploy to GitHub Pages
# ============================================================
#
# Branching strategy:
#   main       → development branch (all work happens here)
#   gh-pages   → production branch (deploy source)
#
# Deploy flow:
#   1. Develop on main
#   2. Create PR from main → gh-pages
#   3. Review, merge & close the PR
#   4. The merge creates a push on gh-pages, triggering this workflow:
#      a. Checks out gh-pages
#      b. Runs scripts/build.js to inject secrets
#      c. Deploys dist/ to GitHub Pages
#
# IMPORTANT: This workflow file must exist on the gh-pages branch
# to be triggered. Keep it in sync when merging from main.
#
# Also supports manual trigger via workflow_dispatch.
#

name: Build & Deploy

on:
  push:
    branches: [gh-pages]
  workflow_dispatch:

# Sets permissions for GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔨 Build (inject secrets)
        env:
          PHONE_NUMBER:    ${{ secrets.PHONE_NUMBER }}
          PHONE_DISPLAY:   ${{ secrets.PHONE_DISPLAY }}
          WHATSAPP_MSG:    ${{ secrets.WHATSAPP_MSG }}
          FACEBOOK_SLUG:   ${{ secrets.FACEBOOK_SLUG }}
          FACEBOOK_HANDLE: ${{ secrets.FACEBOOK_HANDLE }}
          GA_ID:           ${{ secrets.GA_ID }}
          FB_PIXEL_ID:     ${{ secrets.FB_PIXEL_ID }}
          FORMSPREE_ID:    ${{ secrets.FORMSPREE_ID }}
        run: node scripts/build.js

      - name: 📄 Setup Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
